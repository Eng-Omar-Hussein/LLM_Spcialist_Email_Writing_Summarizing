---
apiVersion: v1
kind: Namespace
metadata:
  name: llm-app
  labels:
    name: llm-app

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: llm-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: omarhussein2111/llm-model:4-ccd2be7
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: llm-app
spec:
  selector:
    app: api
  type: LoadBalancer
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
